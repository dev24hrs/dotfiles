set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# ------------------- general settings -------------------
setw -g xterm-keys on
# set-option -g default-terminal "xterm-256color"
set -g default-terminal "tmux-256color"
set-option -a terminal-features "xterm-256color:RGB"
# set-option -g default-terminal "tmux-256color"
# set-option -a terminal-features "tmux-256color:RGB"


set -s escape-time 10
set -sg repeat-time 600
set -s focus-events on
set -g history-limit 10000

set -s set-clipboard on
set -g mouse on

set -g pane-base-index 1
set-window-option -g pane-base-index 1
# Useful when using sharing a session with different size terminals
setw -g aggressive-resize on

# set for https://github.com/3rd/image.nvim?tab=readme-ov-file#tmux
set -gq allow-passthrough on

# reload configuration
bind r source-file ~/.config/tmux/tmux.conf \; display '~/.config/tmux/tmux.conf reloaded'

# ------------------- display ---------------------------
set -g base-index 1           # start windows numbering at 1
set -g renumber-windows on    # renumber windows when a window is closed
set -g set-titles on          # set terminal title
set -g display-panes-time 800 # slightly longer pane indicators display time
set -g display-time 1000      # slightly longer status messages display time
set -g status-interval 10     # redraw status line every 10 seconds

# activity
set -g visual-activity off
set -g monitor-activity off

# --------------------Vim model---------------------------
set -g mode-keys vi
set -g status-keys emacs  # use emacs mode is better even if u r vim user

bind -T copy-mode-vi v send-keys -X begin-selection
# bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'pbcopy'
bind -T copy-mode-vi h send-keys -X cursor-left
bind -T copy-mode-vi l send-keys -X cursor-right
bind -T copy-mode-vi k send-keys -X cursor-up
bind -T copy-mode-vi j send-keys -X cursor-down

# defaukl keybinds
# ----------------------------------------------------

# session
# prefix + s : show all sessions
# prefix + $ : rename currrent seesion
# prefix + d : detach seesion

# window
# prefix + w : show all windows
# prefix + c : new a window
# prefix + , : rename current window

# -----------------------------------------------------

# 强制 Tab 以原始字符透传，防止 extended-keys 将其转换为 CSI u 序列导致 fish 无法识别
bind -n Tab send-keys Tab

# Close current window
unbind &
unbind q
unbind space
bind-key -T prefix q kill-window

# Shift-arrow to switch windows
bind -n S-Left previous-window
bind -n S-Right next-window

# default keys to swicth windows
# prefix + p : previous window
# prefix + n : next window
# prefix + 0-9 : switch to window

# Panes
# ----------------------------------------------------

# prefix + x : close current pane without confirm
bind-key -T prefix x kill-pane

# `prefix + - `& `prefix + \` to Split windows
unbind -
bind - split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"

# Ctrl+ h,j,k,l to switch panes
# use plugin 'christoomey/vim-tmux-navigator' with ctrl + h,j,k,l within neovim
# bind -n C-h select-pane -L
# bind -n C-l select-pane -R
# bind -n C-k select-pane -U
# bind -n C-j select-pane -D

# bind-key -T prefix h select-pane -L
# bind-key -T prefix l select-pane -R
# bind-key -T prefix j select-pane -D
# bind-key -T prefix k select-pane -U

# Use Alt(  Option)-arrow keys without prefix key to switch panes
# M is Option key on MacOS
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# use prefix + m zoom and unzoom panes
bind-key -T prefix m resize-pane -Z
bind-key -T prefix H resize-pane -L 10
bind-key -T prefix J resize-pane -D 10
bind-key -T prefix K resize-pane -U 10
bind-key -T prefix L resize-pane -R 10

# open lazygit in a new window with prefix+g
bind G new-window -n "lazygit" -c "#{pane_current_path}" "lazygit"

# 使用 Prefix + g 打开 lazygit popup
bind g display-popup -d "#{pane_current_path}" -E -w 85% -h 85% "fish -c lazygit"

# Run Claude Code in a separate session
bind -r y run-shell '\
  SESSION="claude-$(echo #{pane_current_path} | md5sum | cut -c1-8)"; \
  tmux has-session -t "$SESSION" 2>/dev/null || \
  tmux new-session -d -s "$SESSION" -c "#{pane_current_path}" "claude"; \
  tmux display-popup -w 85% -h 85% -E "tmux attach-session -t $SESSION"'

# ---------------- Visual settings --------------------
# Status bar

BG=default
RED="#fb4934"
set-option -g status-justify centre
set-option -g status-style "bg=${BG}"
set-option -g status-left "#[bg=${BG},bold][ #S ]"
set-option -g status-left-length 400
set-option -g status-left-style default
set-option -g status-right "#[bold]%Y-%m-%d %H:%M "
set-option -g status-right-length 600
set-option -g status-right-style default

set-option -g window-status-current-format "#[bold] #I:#W#F "
set-option -g window-status-current-style "bg=${BG},fg=${RED}"
set-option -g window-status-separator ""
set-option -g window-status-activity-style none


# ----------------- plugins --------------------------
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @vim_navigator_mapping_prev ""  # removes the C-\ binding
set -g @vim_navigator_prefix_mapping_clear_screen ""

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'

