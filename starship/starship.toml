"$schema" = 'https://starship.rs/config-schema.json'

scan_timeout = 10
command_timeout = 5000

[character]
success_symbol = '[➜](bold green)'

[git_branch]
symbol = " "

[git_commit]
commit_hash_length = 7
format = "on [$hash]($style)"
tag_symbol = '  '

[git_status]
ahead = '⇡ ${count}'
diverged = '⇕⇡ ${ahead_count}⇣ ${behind_count}'
behind = '⇣ ${count}'

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = '[ PICKING](bold red)'

[git_metrics]
disabled = false
added_style = 'bold blue'
format = '[+$added]($added_style)/[-$deleted]($deleted_style) '

[lua]
style = "bold red"
symbol = "Lua "

[golang]
style = "bold red"
symbol = "Go "

[gradle]
style = "bold red"
symbol = "Gradle "

[java]
style = "bold red"
symbol = "Java"

[nodejs]
style = "bold red"
symbol = "NodeJS "

[rust]
style = "bold red"
symbol = "Rust "

[python]
style = "bold red"
symbol = "Python "
